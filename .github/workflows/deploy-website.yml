name: Deploy Website to GitHub Pages

on:
  push:
    branches: [copilot/build-official-website]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: website/package-lock.json

      - name: Build WASM binary
        run: GOOS=js GOARCH=wasm go build -o website/public/erdn.wasm ./cmd/wasm

      - name: Copy wasm_exec.js
        run: |
          # wasm_exec.js moved from misc/wasm/ (Go ≤1.23) to lib/wasm/ (Go ≥1.24)
          GOROOT="$(go env GOROOT)"
          if [ -f "$GOROOT/lib/wasm/wasm_exec.js" ]; then
            cp "$GOROOT/lib/wasm/wasm_exec.js" website/public/wasm_exec.js
          else
            cp "$GOROOT/misc/wasm/wasm_exec.js" website/public/wasm_exec.js
          fi

      - name: Install website dependencies
        run: npm ci
        working-directory: website

      - name: Build VitePress site
        run: npm run build
        working-directory: website

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: website/.vitepress/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
