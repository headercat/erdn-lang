name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test-and-render:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run tests
        run: go test ./...

      - name: Build erdn
        run: go build -o erdn ./cmd/erdn

      - name: Render examples to SVG
        run: |
          for f in examples/*.erdn; do
            out="${f%.erdn}.svg"
            ./erdn render "$f" --out "$out"
            echo "rendered: $out"
          done

      - name: Upload SVG diagrams
        id: upload
        uses: actions/upload-artifact@v4
        with:
          name: er-diagrams
          path: examples/*.svg
          if-no-files-found: error

      - name: Comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        env:
          ARTIFACT_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            // Collect rendered SVGs and their sources
            const examplesDir = 'examples';
            const erdn = fs.readdirSync(examplesDir).filter(f => f.endsWith('.erdn'));

            let sections = '';
            for (const file of erdn) {
              const name = path.basename(file, '.erdn');
              const svgPath = path.join(examplesDir, `${name}.svg`);
              const svgExists = fs.existsSync(svgPath);

              sections += `\n### \`${file}\`\n\n`;
              if (svgExists) {
                const svgSize = fs.statSync(svgPath).size;
                sections += `SVG rendered successfully (${(svgSize / 1024).toFixed(1)} KB)\n\n`;
              }
            }

            const artifactUrl = process.env.ARTIFACT_URL;

            const body = [
              '## 🗂 ER Diagram Render',
              '',
              '✅ **Tests passed** — `go test ./...`',
              '',
              sections.trim(),
              '',
              '---',
              `📦 **[Download SVG diagrams](${artifactUrl})** — open the workflow run and expand *Artifacts* to download \`er-diagrams.zip\`.`,
            ].join('\n');

            // Find existing bot comment and update it, or create a new one
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComment = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('ER Diagram Render')
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
